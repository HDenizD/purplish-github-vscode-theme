name: Publish to VS Code Marketplace

# Publishes automatically whenever the "version" in package.json is bumped on
# main. You can also run it by hand from the Actions tab (workflow_dispatch).
on:
  push:
    branches: [main]
    paths: ["package.json"]
  workflow_dispatch:

permissions:
  contents: write # needed to push the version tag

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip if this version was already published (tag exists)
        id: check
        run: |
          if git rev-parse "v${{ steps.pkg.outputs.version }}" >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version v${{ steps.pkg.outputs.version }} is already tagged — nothing to do."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check.outputs.should_publish == 'true'
        run: npm install

      - name: Build themes
        if: steps.check.outputs.should_publish == 'true'
        run: npm run build

      - name: Publish to the Marketplace
        if: steps.check.outputs.should_publish == 'true'
        run: npx @vscode/vsce publish -p "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Tag the published version
        if: steps.check.outputs.should_publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.pkg.outputs.version }}"
          git push origin "v${{ steps.pkg.outputs.version }}"
